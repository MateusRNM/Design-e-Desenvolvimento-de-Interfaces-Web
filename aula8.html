<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/aula8.css" rel="stylesheet">
    <title>Aula 8</title>
</head>
<body>
    <form action="/act" method="post" enctype="multipart/form-data">
        <fieldset class="container">
            <legend>Dados Pessoais</legend>

            <div class="formRow">
                <label for="name">Nome:</label>
                <input type="text" name="name"/>

                <label for="surname">Sobrenome:</label>
                <input type="text" name="surname"/>
            </div>

            <div class="formRow">
                <label for="birthday">Nascimento:</label>
                <input type="date"/>
            </div>

            <div class="formRow">
                <label for="birthday">RG:</label>
                <input type="text"/>
            </div>

            <div class="formRow">
                <label for="birthday">CPF:</label>
                <input type="text"/>
                <span>-</span>
                <input type="text"/>
            </div>
        </fieldset>

        <fieldset class="container">
            <legend>Dados de Endereço</legend>

            <div class="formRow">
                <label for="street">Rua:</label>
                <input type="text" name="street"/>

                <label for="number">Numero:</label>
                <input type="number" name="number"/>
            </div>

            <div class="formRow">
                <label for="neighborhood">Bairro:</label>
                <input type="text" name="neighborhood"/>
            </div>

            <div class="formRow">
                <label for="state">Estado:</label>
                <select name="state">
                    <option>Acre</option>
                </select>
            </div>

            <div class="formRow">
                <label for="city">Cidade:</label>
                <input type="text" name="city"/>
            </div>

            <div class="formRow">
                <label for="cep">CEP:</label>
                <input type="text"/>
                <span>-</span>
                <input type="text"/>
            </div>
        </fieldset>

        <fieldset class="container">
            <legend>Dados de login</legend>

            <div class="formRow">
                <label for="email">Email:</label>
                <input type="email" name="email"/>
            </div>

            <div class="formRow">
                <label for="photo">Imagem de Perfil:</label>
                <label id="customSelector" for="photoInput">Escolher</label>
                <input id="photoInput" type="file" name="photo" accept="image/*" />
            </div>

            <div class="formRow">
                <label for="username">Login de Usuário:</label>
                <input type="text" name="username" />
            </div>

            <div class="formRow">
                <label for="password">Senha:</label>
                <input type="password" name="password"/>
            </div>

            <div class="formRow">
                <label for="confirmPassword">Confirme a senha:</label>
                <input type="password" name="confirmPassword" />
            </div>
        </fieldset>
        
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
