<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="./styles/aula4.css"/>
        <title>Aula 4 - Tabelas</title>
    </head>
    <body>
        <h1>Aula sobre tabelas</h1>
        <table>
            <thead>
                <tr>
                    <td colspan="3">Informação Nutricional</td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="2">Quantidade por porção</td>
                    <td>% VD (*)</td>
                </tr>
                <tr>
                    <td>Valor Energético</td>
                    <td>137kcal = 575kJ</td>
                    <td>7%</td>
                </tr>
                <tr>
                    <td>Carboidratos</td>
                    <td>25g</td>
                    <td>8%</td>
                </tr>
                <tr>
                    <td>Proteínas</td>
                    <td>4,1g</td>
                    <td>5%</td>
                </tr>
                <tr>
                    <td>Gorduras totais</td>
                    <td>2,3g</td>
                    <td>4%</td>
                </tr>
                <tr>
                    <td>Gorduras saturadas</td>
                    <td>0,6g</td>
                    <td>3%</td>
                </tr>
                <tr>
                    <td>Gorduras trans</td>
                    <td>0g</td>
                    <td>**</td>
                </tr>
                <tr>
                    <td>Fibra alimentar</td>
                    <td>1,1g</td>
                    <td>4%</td>
                </tr>
                <tr>
                    <td>Sódio</td>
                    <td>240mg</td>
                    <td>10%</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
