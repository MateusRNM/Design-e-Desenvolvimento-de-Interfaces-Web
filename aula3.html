<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./aula3.css">   
        <title>Aula 3</title>
    </head>
    <body>
        <h1>Aula de IMG</h1>
        <!-- Void Element - elemento que não possui tag de fechamento -->
        <img src="./images/cinema.jpg" alt="Cinema" width="200px" height="200px"/>
        <!-- Colocar width e height sempre no HTML para evitar layout shifting (a imagem carregar e ser redimensionada após o css ser carregado) -->
        <img src="./images/messi.jpg" alt="Messi" width="200px" height="200px"/>
    </body>
</html>
