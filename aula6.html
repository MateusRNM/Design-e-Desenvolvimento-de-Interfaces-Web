<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/aula6.css">
    <title>Aula 6 - Colspan e Rowspan</title>
</head>
<body>
    
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td colspan="3">8</td>
            <td>9</td>
        </tr>
        <tr>
            <td rowspan="2">10</td>
            <td colspan="2">11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>

    <table>
        <tr>
            <td>A</td>
            <td>B</td>
            <td>C</td>
            <td rowspan="2">D</td>
        </tr>
        <tr>
            <td>E</td>
            <td>F</td>
            <td>G</td>
        </tr>
        <tr>
            <td>H</td>
            <td>I</td>
            <td colspan="2">J</td>
        </tr>
        <tr>
            <td colspan="4">K</td>
        </tr>
    </table>

    <table>
        <tbody>
            <tr>
                <td colspan="2">0</td>
                <td colspan="2">1</td>
                <td>2</td>
                <td rowspan="5">3</td>
                <td colspan="2">4</td>
                <td>5</td>
                <td rowspan="5">6</td>
                <td colspan="2">7</td>
                <td colspan="2">8</td>
            </tr>
            <tr>
                <td colspan="2">9</td>
                <td>10</td>
                <td colspan="2">11</td>
                <td colspan="2">12</td>
                <td>13</td>
                <td colspan="2">14</td>
                <td colspan="2">15</td>
            </tr>
            <tr>
                <td colspan="2">16</td>
                <td colspan="2">17</td>
                <td>18</td>
                <td colspan="2">19</td>
                <td>20</td>
                <td colspan="2">21</td>
                <td colspan="2">22</td>
            </tr>
            <tr>
                <td colspan="2">23</td>
                <td colspan="2">24</td>
                <td>25</td>
                <td colspan="2">26</td>
                <td>27</td>
                <td colspan="2">29</td>
                <td colspan="2">30</td>
            </tr>
            <tr>
                <td colspan="2">23</td>
                <td colspan="2">24</td>
                <td>25</td>
                <td colspan="2">26</td>
                <td>27</td>
                <td>28</td>
                <td colspan="2">29</td>
                <td colspan="2">30</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
